model:
  pretrained_name: "models/wav2vec2-xls-r-300m"
  freeze_backbone: false  # reference fine-tunes the entire XLS-R backbone
  num_layers: 24
  hidden_dim: 1024
  num_classes: 2

data:
  train_protocol_path: "data/LA_2019/ASVspoof2019_LA_cm_protocols/ASVspoof2019.LA.cm.train.trn.txt"
  train_audio_dir: "data/LA_2019/ASVspoof2019_LA_train/flac"
  eval_protocol_path: "data/LA_2019/ASVspoof2019_LA_cm_protocols/ASVspoof2019.LA.cm.eval.trl.txt"
  eval_audio_dir: "data/LA_2019/ASVspoof2019_LA_eval/flac"
  # eval_protocol_path: "data/LA_2021/keys/LA/CM/trial_metadata.txt"
  # eval_audio_dir: "data/LA_2021/ASVspoof2021_LA_eval/flac"
  sample_rate: 16000
  segment_samples: 64600
  augment: true
  rawboost:
    snr_min: 10
    snr_max: 40
    num_bands: 5
    freq_lo: 20
    freq_hi: 8000
    bw_lo: 100
    bw_hi: 1000
    order_lo: 10
    order_hi: 100
    gain_lo: 0
    gain_hi: 0

train:
  batch_size: 14          # reference uses 14
  lr: 0.000001
  weight_decay: 0.0001
  epochs: 100             # reference uses 100
  early_stop_patience: 1  # reference stops after 1 epoch without improvement
  val_every_n_epochs: 1
  seed: 1234
  num_workers: 8          # reference uses 8
  precision: "32-true"    # reference trains in FP32
  grad_clip: null         # reference has no gradient clipping
  loss_weights:
    - 0.1  # spoof (class 0)
    - 0.9  # bonafide (class 1)
  checkpoint_save_dir: "checkpoints"
  checkpoint_path: null
  eval_only: false
  log_train_eer: true

eval:
  metrics: ["eer"]
  save_scores_path: null

logging:
  backend: "wandb"
  run_dir: "runs"
  project: "audio-deepfake"
  log_every_n_steps: 20
  use_wandb: true
