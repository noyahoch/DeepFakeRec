model:
  pretrained_name: "models/wav2vec2-xls-r-300m"
  freeze_backbone: false
  num_layers: 24
  hidden_dim: 1024
  num_classes: 2
  layer_aggregation: "sigmoid"

data:
  train_protocol_path: "data/LA_2019/LA/ASVspoof2019_LA_cm_protocols/ASVspoof2019.LA.cm.train.trn.txt"
  train_audio_dir: "data/LA_2019/LA/ASVspoof2019_LA_train/flac"
  eval_protocol_path: "data/LA_2021/keys/LA/CM/trial_metadata.txt"
  eval_audio_dir: "data/LA_2021/ASVspoof2021_LA_eval/flac"
  use_rawboost: true

train:
  batch_size: 5           # paper Section 4.2 specifies batch_size=5
  lr: 0.000001
  weight_decay: 0.0001  # try 0.001 or 0.005 if overfitting to 2019 / LA 2021 EER goes up
  epochs: 50              # paper Section 4.2 specifies 50 epochs
  early_stop_patience: 50
  # Stop when val EER stops improving (recommended for 2021 generalization). Use "train/loss" to match ref exactly.
  early_stop_monitor: "val/eer"
  val_every_n_epochs: 1
  seed: 1234
  num_workers: 8          # reference uses 8
  precision: "32-true"    # reference trains in FP32
  grad_clip: null         # reference has no gradient clipping
  loss_weights:
    - 0.1  # spoof (class 0)
    - 0.9  # bonafide (class 1)
  checkpoint_save_dir: "checkpoints"
  checkpoint_path: null
  eval_only: false
  log_train_eer: true

eval:
  metrics: ["eer"]
  save_scores_path: null
  batch_size: 32
  
logging:
  backend: "wandb"
  run_dir: "runs"
  project: "audio-deepfake"
  log_every_n_steps: 20
  use_wandb: true
